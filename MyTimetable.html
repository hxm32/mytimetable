<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Timetable</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --border: #2a2d35;
    --text: #e8e9ec;
    --muted: #5a5e6b;
    --accent: #c8f060;
    --accent-text: #0e0f11;
  }

  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; padding: 48px 24px; transition: background 0.3s, color 0.3s; }

  header { max-width: 720px; margin: 0 auto 48px; display: flex; align-items: flex-end; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 24px; gap: 16px; flex-wrap: wrap; }
  .header-left h1 { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(2rem, 5vw, 3.2rem); line-height: 1; letter-spacing: -0.02em; }
  .header-left h1 em { font-style: italic; color: var(--accent); }
  .header-left .date-label { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 8px; }

  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
  .nav-buttons { display: flex; gap: 8px; }
  .nav-btn { background: none; border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.75rem; padding: 8px 14px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em; }
  .nav-btn:hover, .nav-btn.active { border-color: var(--accent); color: var(--accent); }

  .theme-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.68rem; padding: 5px 10px; cursor: pointer; letter-spacing: 0.06em; transition: all 0.15s; }
  .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

  main { max-width: 720px; margin: 0 auto; }

  /* Theme panel */
  .theme-panel { border: 1px solid var(--border); padding: 24px; margin-bottom: 32px; display: none; }
  .theme-panel.open { display: block; }
  .theme-panel h3 { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }
  .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-bottom: 20px; }
  .theme-swatch { border: 1px solid var(--border); padding: 10px 8px; cursor: pointer; text-align: center; font-size: 0.65rem; letter-spacing: 0.06em; text-transform: uppercase; transition: all 0.15s; color: var(--muted); }
  .theme-swatch:hover, .theme-swatch.active { border-color: var(--accent); color: var(--accent); }
  .swatch-dot { width: 16px; height: 16px; border-radius: 50%; margin: 0 auto 6px; }
  .theme-custom { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .theme-custom label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 4px; }
  .theme-custom input[type=color] { width: 100%; height: 36px; border: 1px solid var(--border); background: var(--bg); cursor: pointer; padding: 2px; }
  .theme-custom input[type=text] { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.72rem; padding: 8px 10px; outline: none; }
  .theme-custom input[type=text]:focus { border-color: var(--accent); }
  .theme-apply { margin-top: 16px; background: var(--accent); color: var(--accent-text); border: none; font-family: 'DM Mono', monospace; font-size: 0.72rem; font-weight: 500; padding: 10px 20px; cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase; transition: opacity 0.15s; }
  .theme-apply:hover { opacity: 0.85; }

  .status { text-align: center; padding: 80px 0; color: var(--muted); font-size: 0.85rem; letter-spacing: 0.05em; }
  .status .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box { border: 1px solid #ff4d4d44; background: #ff4d4d11; padding: 20px 24px; font-size: 0.78rem; color: #ff8080; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }

  .token-form { border: 1px solid var(--border); padding: 32px; margin-bottom: 32px; }
  .token-form p { font-size: 0.75rem; color: var(--muted); margin-bottom: 12px; line-height: 1.6; }
  .token-form p a { color: var(--accent); text-decoration: none; }
  .token-form p code { background: var(--surface); padding: 1px 5px; font-size: 0.7rem; }
  .token-form label { display: block; font-size: 0.68rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; margin-top: 16px; }
  .token-form input, .token-form textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.72rem; padding: 10px 12px; outline: none; transition: border-color 0.15s; }
  .token-form textarea { resize: vertical; min-height: 70px; }
  .token-form input:focus, .token-form textarea:focus { border-color: var(--accent); }
  .token-form input::placeholder, .token-form textarea::placeholder { color: var(--muted); }
  .token-form button { margin-top: 20px; background: var(--accent); color: var(--accent-text); border: none; font-family: 'DM Mono', monospace; font-size: 0.75rem; font-weight: 500; padding: 12px 24px; cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase; transition: opacity 0.15s; }
  .token-form button:hover { opacity: 0.85; }

  .empty-day { text-align: center; padding: 60px 0; color: var(--muted); font-size: 0.8rem; letter-spacing: 0.05em; }
  .empty-day .big { font-family: 'Fraunces', serif; font-size: 4rem; color: var(--border); display: block; margin-bottom: 12px; }

  .class-list { display: flex; flex-direction: column; }
  .class-card { display: grid; grid-template-columns: 56px 4px 1fr auto; gap: 0 16px; align-items: start; padding: 20px 0; border-bottom: 1px solid var(--border); animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .class-card:last-child { border-bottom: none; }
  .class-time { font-size: 0.68rem; color: var(--muted); line-height: 1.6; text-align: right; padding-top: 3px; }
  .class-bar { width: 4px; border-radius: 2px; min-height: 40px; }
  .class-subject { font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.05rem; line-height: 1.2; margin-bottom: 6px; letter-spacing: -0.01em; }
  .class-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 0.7rem; color: var(--muted); }
  .class-meta span { display: flex; align-items: center; gap: 5px; }
  .class-period { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; padding-top: 4px; white-space: nowrap; }
  .now-indicator { font-size: 0.62rem; background: var(--accent); color: var(--accent-text); padding: 2px 6px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; margin-left: 8px; vertical-align: middle; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>my <em>timetable</em></h1>
    <div class="date-label" id="date-label">—</div>
  </div>
  <div class="header-right">
 <div class="nav-buttons">
  <button class="nav-btn" onclick="findNextClass()">⚡ next class</button> <button class="nav-btn" onclick="changeDay(-1)">← prev</button>
  <button class="nav-btn active" onclick="goToday()">today</button>
  <button class="nav-btn" onclick="changeDay(1)">next →</button>
  <button class="theme-btn" onclick="toggleThemePanel()">⚙ theme</button>
</div>
  </div>
</header>

<main>
  <div class="theme-panel" id="theme-panel">
    <h3>Customise theme</h3>
    <div class="theme-grid" id="theme-grid"></div>
    <h3 style="margin-bottom:14px">Custom colours</h3>
    <div class="theme-custom">
      <div>
        <label>Background</label>
        <input type="color" id="c-bg" value="#0e0f11">
      </div>
      <div>
        <label>Surface</label>
        <input type="color" id="c-surface" value="#16181c">
      </div>
      <div>
        <label>Text</label>
        <input type="color" id="c-text" value="#e8e9ec">
      </div>
      <div>
        <label>Accent</label>
        <input type="color" id="c-accent" value="#c8f060">
      </div>
      <div>
        <label>Border</label>
        <input type="color" id="c-border" value="#2a2d35">
      </div>
      <div>
        <label>Muted</label>
        <input type="color" id="c-muted" value="#5a5e6b">
      </div>
    </div>
    <button class="theme-apply" onclick="applyCustomTheme()">Apply custom theme</button>
  </div>

  <div class="token-form" id="token-form">
    <p>
      Go to <a href="https://caulfieldlife.com.au" target="_blank">caulfieldlife.com.au</a> and log in.
      Open DevTools → <strong>Network</strong> → filter <code>life-api</code> → reload →
      click the <strong>ClassData</strong> POST → <strong>Request Headers</strong> →
      copy the value of <code>x-community-token</code>.
    </p>
    <label>x-community-token (from ClassData request headers)</label>
    <textarea id="jwt-input" placeholder="eyJ0eXA..."></textarea>
    <label>Member ID — DevTools → Network → reload → ClassData POST → Response → Id. Make sure you pick the second ID, because the first one doesn't work.</label>
    <input id="member-input">
    <br>
    <button onclick="loadWithToken()">Load timetable</button>
  </div>
  <div id="content"></div>
</main>

<script>
  const API = "https://life-api.caulfieldlife.com.au/";
  const BASE_HEADERS = {
    "Content-Type": "application/json",
    "authorization": "Bearer X-ae97a16a-3e28-4365:Y-53e74b38-8a53-4ef7",
    "origin": "https://caulfieldlife.com.au",
    "referer": "https://caulfieldlife.com.au/",
  };

  const THEMES = [
    { name: "Light",    bg: "#ffffff", surface: "#f0f0f0", border: "#cccccc", text: "#000000", muted: "#888888", accent: "#000000", accentText: "#ffffff" },
    { name: "Dark",    bg: "#0f0f0f", surface: "#404040", border: "#f0f0f0", text: "#b5b5b5", muted: "#f0f0f0", accent: "#ffffff", accentText: "#0e0f11" },
  ];

  let currentDate = new Date();
  let cachedJwt = null;
  let cachedMemberId = null;
  let currentClasses = []; // Store the fetched classes globally for searching

 const savedTheme = localStorage.getItem('timetable-theme');
  if (savedTheme) {
    try { 
      applyTheme(JSON.parse(savedTheme)); 
    } catch(e) {
      applyTheme(THEMES[0]); // Default to Light if error
    }
  } else {
    applyTheme(THEMES[0]); // Default to Light if first time visiting
  }
 
  // --- THEME LOGIC ---
  function applyTheme(t) {
    const r = document.documentElement.style;
    r.setProperty('--bg', t.bg);
    r.setProperty('--surface', t.surface);
    r.setProperty('--border', t.border);
    r.setProperty('--text', t.text);
    r.setProperty('--muted', t.muted);
    r.setProperty('--accent', t.accent);
    r.setProperty('--accent-text', t.accentText || '#0e0f11');
    localStorage.setItem('timetable-theme', JSON.stringify(t));
    document.querySelectorAll('.theme-swatch').forEach((el, i) => {
      el.classList.toggle('active', THEMES[i]?.name === t.name);
    });
  }

  function applyCustomTheme() {
    applyTheme({
      name: 'Custom',
      bg: document.getElementById('c-bg').value,
      surface: document.getElementById('c-surface').value,
      border: document.getElementById('c-border').value,
      text: document.getElementById('c-text').value,
      muted: document.getElementById('c-muted').value,
      accent: document.getElementById('c-accent').value,
      accentText: isLight(document.getElementById('c-accent').value) ? '#0e0f11' : '#f5f5f2',
    });
  }

  function isLight(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return (r * 299 + g * 587 + b * 114) / 1000 > 128;
  }

  function buildThemeGrid() {
    const grid = document.getElementById('theme-grid');
    grid.innerHTML = THEMES.map((t, i) => `
      <div class="theme-swatch" onclick="applyTheme(THEMES[${i}])">
        <div class="swatch-dot" style="background:${t.accent};border:2px solid ${t.border}"></div>
        ${t.name}
      </div>
    `).join('');
  }

  function toggleThemePanel() {
    document.getElementById('theme-panel').classList.toggle('open');
  }

  // --- DATA LOGIC ---
  function formatDateLabel(d) {
    return d.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }

  function getMelbourneDayRange(date) {
    const y = date.toLocaleString('en-AU', { timeZone: 'Australia/Melbourne', year: 'numeric' });
    const m = date.toLocaleString('en-AU', { timeZone: 'Australia/Melbourne', month: '2-digit' });
    const d = date.toLocaleString('en-AU', { timeZone: 'Australia/Melbourne', day: '2-digit' });

    const toUTC = localStr => {
      const asIfUTC = new Date(localStr + 'Z');
      const probe = new Date();
      const melbOffset = new Date(probe.toLocaleString('en-AU', { timeZone: 'Australia/Melbourne', hour12: false }).replace(',',''))
                       - new Date(probe.toLocaleString('en-AU', { timeZone: 'UTC', hour12: false }).replace(',',''));
      return new Date(asIfUTC.getTime() - melbOffset).toISOString();
    };

    return {
      startTime: toUTC(`${y}-${m}-${d}T00:00:00`),
      endTime:   toUTC(`${y}-${m}-${d}T23:59:59.999`),
    };
  }

  function formatTime(iso) {
    return new Date(iso).toLocaleTimeString('en-AU', { timeZone: 'Australia/Melbourne', hour: '2-digit', minute: '2-digit', hour12: false });
  }

  function isNow(s, e) {
    const now = new Date();
    return new Date(s) <= now && now <= new Date(e);
  }

  async function fetchClasses(jwt, memberId, date) {
    const { startTime, endTime } = getMelbourneDayRange(date);
    const res = await fetch(API, {
      method: "POST",
      headers: { ...BASE_HEADERS, "x-community-token": jwt },
      body: JSON.stringify({
        operationName: "ClassData",
        variables: { memberId, startTime, endTime },
        query: `fragment ClassFields on Class {
          id title description startTime endTime
          dayOrder periodOrder periodName colour room teacherName
        }
        query ClassData($memberId: ID!, $startTime: DateTime!, $endTime: DateTime) {
          classes(
            where: { startTime: $startTime, endTime: $endTime, memberId: $memberId }
            orderBy: { property: "startTime", sort: ASC }
          ) { ...ClassFields }
        }`
      })
    });
    const data = JSON.parse(await res.text());
    if (data?.errors?.length) throw new Error(JSON.stringify(data.errors, null, 2));
    currentClasses = data?.data?.classes ?? [];
    return currentClasses;
  }

  function renderClasses(classes, highlightId = null) {
    const el = document.getElementById("content");
    if (!classes.length) {
      el.innerHTML = `<div class="empty-day"><span class="big">—</span>No classes scheduled.</div>`;
      return;
    }
    el.innerHTML = `<div class="class-list">${classes.map((c, i) => {
      const isNext = c.id === highlightId;
      return `
      <div class="class-card" id="class-${c.id}" style="animation-delay:${i * 0.05}s; ${isNext ? 'border: 1px solid var(--accent); padding: 20px;' : ''}">
        <div class="class-time">${formatTime(c.startTime)}<br>${formatTime(c.endTime)}</div>
        <div class="class-bar" style="background:${c.colour || 'var(--muted)'}"></div>
        <div class="class-body">
          <div class="class-subject">
            ${c.description || c.title}
            ${isNow(c.startTime, c.endTime) ? '<span class="now-indicator">now</span>' : ''}
            ${isNext ? '<span class="now-indicator" style="background:var(--text); color:var(--bg)">NEXT UP</span>' : ''}
          </div>
          <div class="class-meta">
            ${c.room ? `<span>📍 ${c.room}</span>` : ''}
            ${c.teacherName ? `<span>👤 ${c.teacherName}</span>` : ''}
          </div>
        </div>
        <div class="class-period">${c.periodName !== null && c.periodName !== '' ? `P${c.periodName}` : ''}</div>
      </div>
    `}).join('')}</div>
    <center><button class="nav-btn" style="margin-top:40px; opacity:0.5" onclick="clearSavedData()">Logout / Clear Keys</button></center>`;
    
    if (highlightId) {
        document.getElementById(`class-${highlightId}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  function findNextClass() {
    const now = new Date();
    if (currentDate.toDateString() !== now.toDateString()) {
        goToday();
        setTimeout(findNextClass, 800);
        return;
    }

    const nextClass = currentClasses.find(c => new Date(c.startTime) > now);

    if (nextClass) {
        renderClasses(currentClasses, nextClass.id);
    } else {
        alert("No more classes for today!");
    }
  }

  function showLoading() {
    document.getElementById("content").innerHTML = `<div class="status"><div class="spinner"></div>Fetching classes...</div>`;
    document.getElementById("date-label").textContent = formatDateLabel(currentDate);
  }

  function showError(msg) {
    document.getElementById("content").innerHTML = `<div class="error-box">${msg}</div>`;
  }

  async function loadWithToken() {
    const jwt = document.getElementById("jwt-input").value.trim();
    const memberId = document.getElementById("member-input").value.trim();
    if (!jwt || !memberId) return;
    
    cachedJwt = jwt;
    cachedMemberId = memberId;
    localStorage.setItem('life-jwt', jwt);
    localStorage.setItem('life-member-id', memberId);

    showLoading();
    try {
      renderClasses(await fetchClasses(cachedJwt, cachedMemberId, currentDate));
      document.getElementById("token-form").style.display = "none";
    } catch(e) { showError(e.message); }
  }

  async function loadTimetable() {
    if (!cachedJwt || !cachedMemberId) return;
    showLoading();
    try {
      renderClasses(await fetchClasses(cachedJwt, cachedMemberId, currentDate));
    } catch(e) { showError(e.message); }
  }

  function changeDay(delta) {
    currentDate = new Date(currentDate);
    currentDate.setDate(currentDate.getDate() + delta);
    loadTimetable();
  }

  function goToday() { currentDate = new Date(); loadTimetable(); }

  function clearSavedData() {
    localStorage.removeItem('life-jwt');
    localStorage.removeItem('life-member-id');
    location.reload();
  }

  buildThemeGrid();
  const savedTheme = localStorage.getItem('timetable-theme');
  if (savedTheme) try { applyTheme(JSON.parse(savedTheme)); } catch(e) {}

  const storedJwt = localStorage.getItem('life-jwt');
  const storedMemberId = localStorage.getItem('life-member-id');

  if (storedJwt && storedMemberId) {
    cachedJwt = storedJwt;
    cachedMemberId = storedMemberId;
    document.getElementById("token-form").style.display = "none";
    loadTimetable();
  }

  document.getElementById("date-label").textContent = formatDateLabel(currentDate);
</script>
</body>
</html>
